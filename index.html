<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Validação de Criativos — Coristina D | Admotion</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'Segoe UI',system-ui,sans-serif;background:#000;}
.wrap{background:linear-gradient(135deg,#000 0%,#002b1a 40%,#004d2b 70%,#00693c 100%);min-height:100vh;padding:2.5rem 1.5rem;}
.header{text-align:center;margin-bottom:2.5rem;}
.logo-img{height:48px;width:auto;margin-bottom:1.25rem;}
.header h1{font-size:22px;font-weight:500;color:#fff;margin-bottom:6px;letter-spacing:-0.01em;}
.header p{font-size:14px;color:rgba(255,255,255,0.5);}
.status-bar{display:flex;justify-content:center;align-items:center;gap:24px;margin-bottom:2rem;}
.stat{text-align:center;}
.stat-num{font-size:26px;font-weight:600;color:#fff;display:block;line-height:1;}
.stat-num.green{color:#21dd66;}
.stat-num.red{color:#ff5c5c;}
.stat-label{font-size:11px;color:rgba(255,255,255,0.4);text-transform:uppercase;letter-spacing:0.07em;margin-top:3px;display:block;}
.divider{width:1px;height:40px;background:rgba(255,255,255,0.1);}
.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(310px,1fr));gap:1.25rem;max-width:1100px;margin:0 auto;}
.card{background:rgba(0,0,0,0.5);border:1px solid rgba(255,255,255,0.09);border-radius:14px;overflow:hidden;transition:border-color .2s;}
.card.approved{border-color:rgba(33,221,102,0.5);}
.card.rejected{border-color:rgba(255,92,92,0.5);}
.frame-wrap{display:flex;justify-content:center;padding:1rem 1rem 0;}
.creative-frame{width:300px;height:250px;background:rgba(255,255,255,0.03);border:1px solid rgba(255,255,255,0.07);border-radius:8px;overflow:hidden;display:flex;align-items:center;justify-content:center;flex-shrink:0;}
.creative-frame iframe{width:300px;height:250px;border:none;display:block;}
.card-body{padding:1rem;}
.title-row{display:flex;align-items:center;justify-content:space-between;margin-bottom:8px;gap:8px;}
.card-name{font-size:13px;font-weight:500;color:rgba(255,255,255,0.9);flex:1;}
.size-tag{font-size:11px;background:rgba(33,221,102,0.1);color:#21dd66;border:1px solid rgba(33,221,102,0.2);border-radius:20px;padding:2px 9px;white-space:nowrap;}
.status-pill{display:inline-flex;align-items:center;gap:5px;font-size:12px;border-radius:20px;padding:3px 10px;margin-bottom:10px;}
.status-pill.pending{background:rgba(255,255,255,0.05);color:rgba(255,255,255,0.4);border:1px solid rgba(255,255,255,0.08);}
.status-pill.approved{background:rgba(33,221,102,0.1);color:#21dd66;border:1px solid rgba(33,221,102,0.22);}
.status-pill.rejected{background:rgba(255,92,92,0.1);color:#ff5c5c;border:1px solid rgba(255,92,92,0.22);}
.obs-box{background:rgba(255,92,92,0.06);border:1px solid rgba(255,92,92,0.18);border-radius:8px;padding:8px 10px;margin-bottom:10px;display:none;}
.obs-box.show{display:block;}
.obs-label{font-size:10px;color:rgba(255,92,92,0.65);text-transform:uppercase;letter-spacing:.06em;margin-bottom:3px;}
.obs-text{font-size:12px;color:rgba(255,180,180,0.8);line-height:1.5;}
.btn-row{display:flex;gap:8px;}
.btn{flex:1;padding:8px;border-radius:8px;border:none;font-size:13px;font-weight:500;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:6px;transition:background .15s,transform .1s;font-family:inherit;}
.btn:active{transform:scale(.97);}
.btn-ok{background:rgba(33,221,102,0.1);color:#21dd66;border:1px solid rgba(33,221,102,0.25);}
.btn-ok:hover{background:rgba(33,221,102,0.2);}
.btn-ok.on{background:#21dd66;color:#000;border-color:#21dd66;}
.btn-fix{background:rgba(255,92,92,0.08);color:#ff5c5c;border:1px solid rgba(255,92,92,0.22);}
.btn-fix:hover{background:rgba(255,92,92,0.18);}
.btn-fix.on{background:#ff5c5c;color:#fff;border-color:#ff5c5c;}
.reject-form{margin-top:10px;display:none;}
.reject-form.show{display:block;}
.reject-form textarea{width:100%;background:rgba(255,255,255,0.04);border:1px solid rgba(255,92,92,0.28);border-radius:8px;padding:8px 10px;font-size:12px;color:rgba(255,255,255,0.8);resize:none;font-family:inherit;margin-bottom:6px;outline:none;}
.reject-form textarea:focus{border-color:rgba(255,92,92,0.55);}
.reject-form textarea::placeholder{color:rgba(255,255,255,0.2);}
.btn-confirm{width:100%;padding:8px;background:#ff5c5c;color:#fff;border:none;border-radius:8px;font-size:13px;font-weight:500;cursor:pointer;font-family:inherit;}
.btn-confirm:hover{background:#ff4040;}
.summary{max-width:1100px;margin:2rem auto 0;background:rgba(0,0,0,0.45);border:1px solid rgba(255,255,255,0.08);border-radius:14px;padding:1.5rem;}
.sum-title{font-size:13px;font-weight:500;color:rgba(255,255,255,0.6);margin-bottom:.75rem;display:flex;align-items:center;gap:8px;}
.sum-title span{width:8px;height:8px;border-radius:50%;background:#21dd66;display:inline-block;}
.sum-body{font-size:12px;color:rgba(255,255,255,0.45);white-space:pre-wrap;line-height:1.8;font-family:'Courier New',monospace;}
.btn-copy{margin-top:.75rem;padding:7px 16px;background:rgba(33,221,102,0.1);color:#21dd66;border:1px solid rgba(33,221,102,0.22);border-radius:8px;font-size:12px;cursor:pointer;font-family:inherit;display:inline-flex;align-items:center;gap:6px;}
.btn-copy:hover{background:rgba(33,221,102,0.2);}
</style>
</head>

    <h1>Validação de Criativos — Coristina D</h1>
    <p>Revise cada peça e aprove ou solicite ajustes abaixo.</p>
  </div>
  <div class="status-bar">
    <div class="stat"><span class="stat-num" id="n-total">10</span><span class="stat-label">Total</span></div>
    <div class="divider"></div>
    <div class="stat"><span class="stat-num green" id="n-ok">0</span><span class="stat-label">Aprovados</span></div>
    <div class="divider"></div>
    <div class="stat"><span class="stat-num red" id="n-fix">0</span><span class="stat-label">Com ajuste</span></div>
  </div>
  <div class="grid" id="grid"></div>
  <div class="summary">
    <div class="sum-title"><span></span> Resumo para envio</div>
    <div class="sum-body" id="sum">Nenhuma ação registrada ainda.</div>
    <button class="btn-copy" onclick="copy()">📋 Copiar resumo</button>
  </div>
</div>
<script>
const creatives=[
  {folder:"Coristina-D_Choveu_300x250",    name:"Choveu"},
  {folder:"Coristina-D_Frio_300x250",       name:"Frio"},
  {folder:"Coristina-D_Generico_300x250",   name:"Genérico"},
  {folder:"Coristina-D_Pegou-Chuva_300x250",name:"Pegou Chuva"},
  {folder:"Coristina-D_Raphinha_Choveu_300x250",    name:"Raphinha — Choveu"},
  {folder:"Coristina-D_Raphinha_Frio_300x250",       name:"Raphinha — Frio"},
  {folder:"Coristina-D_Raphinha_Generico_300x250",   name:"Raphinha — Genérico"},
  {folder:"Coristina-D_Raphinha_Pegou-Chuva_300x250",name:"Raphinha — Pegou Chuva"},
  {folder:"Coristina-D_Raphinha_Virou_300x250",      name:"Raphinha — Virou"},
  {folder:"Coristina-D_Virou_300x250",               name:"Virou"}
];
const st=creatives.map(()=>({s:"pending",obs:""}));
function stats(){
  document.getElementById("n-ok").textContent=st.filter(x=>x.s==="approved").length;
  document.getElementById("n-fix").textContent=st.filter(x=>x.s==="rejected").length;
}
function summary(){
  const lines=["📋 VALIDAÇÃO DE CRIATIVOS — CORISTINA D","Formato: 300×250px",""];
  creatives.forEach((c,i)=>{
    const ic=st[i].s==="approved"?"✅":st[i].s==="rejected"?"❌":"⏳";
    lines.push(ic+" "+c.name);
    if(st[i].s==="rejected"&&st[i].obs)lines.push("   → Ajuste: "+st[i].obs);
  });
  lines.push("");
  lines.push("Total: "+creatives.length+" | ✅ "+st.filter(x=>x.s==="approved").length+" aprovados | ❌ "+st.filter(x=>x.s==="rejected").length+" com ajuste | ⏳ "+st.filter(x=>x.s==="pending").length+" pendentes");
  document.getElementById("sum").textContent=lines.join("\n");
}
function render(i){
  const card=document.getElementById("c"+i);
  const s=st[i];
  card.className="card"+(s.s!=="pending"?" "+s.s:"");
  const pill=card.querySelector(".status-pill");
  pill.className="status-pill "+s.s;
  pill.textContent=s.s==="pending"?"⏳ Aguardando revisão":s.s==="approved"?"✅ Aprovado":"❌ Ajuste solicitado";
  card.querySelector(".btn-ok").classList.toggle("on",s.s==="approved");
  card.querySelector(".btn-fix").classList.toggle("on",s.s==="rejected");
  const obs=card.querySelector(".obs-box");
  if(s.s==="rejected"&&s.obs){obs.classList.add("show");obs.querySelector(".obs-text").textContent=s.obs;}
  else obs.classList.remove("show");
  if(s.s!=="rejected"){card.querySelector(".reject-form").classList.remove("show");card.querySelector("textarea").value="";}
}
function approve(i){st[i]={s:"approved",obs:""};render(i);stats();summary();}
function toggleFix(i){const f=document.getElementById("rf"+i);f.classList.toggle("show");if(f.classList.contains("show"))f.querySelector("textarea").focus();}
function confirmFix(i){const obs=document.getElementById("rf"+i).querySelector("textarea").value.trim();st[i]={s:"rejected",obs};render(i);stats();summary();}
function copy(){navigator.clipboard.writeText(document.getElementById("sum").textContent).then(()=>{const b=document.querySelector(".btn-copy");b.textContent="✅ Copiado!";setTimeout(()=>b.textContent="📋 Copiar resumo",2000);});}
const grid=document.getElementById("grid");
creatives.forEach((c,i)=>{
  grid.innerHTML+=`<div class="card" id="c${i}">
    <div class="frame-wrap">
      <div class="creative-frame">
        <iframe src="${c.folder}/index.html" title="${c.name}" loading="lazy"></iframe>
      </div>
    </div>
    <div class="card-body">
      <div class="title-row"><span class="card-name">${c.name}</span><span class="size-tag">300×250</span></div>
      <span class="status-pill pending">⏳ Aguardando revisão</span>
      <div class="obs-box"><div class="obs-label">Ajuste solicitado</div><div class="obs-text"></div></div>
      <div class="btn-row">
        <button class="btn btn-ok" onclick="approve(${i})">✓ Aprovar</button>
        <button class="btn btn-fix" onclick="toggleFix(${i})">✎ Ajuste</button>
      </div>
      <div class="reject-form" id="rf${i}">
        <textarea placeholder="Descreva o ajuste necessário…" rows="3"></textarea>
        <button class="btn-confirm" onclick="confirmFix(${i})">Confirmar solicitação</button>
      </div>
    </div>
  </div>`;
});
</script>
</body>
</html>
